name: Full Stack Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Starting Deployment..."

            REPO_DIR=/home/ubuntu/app_repo
            APP_DIR=/home/ubuntu/apps/webapp

            # ========================
            # CLONE OR PULL REPO
            # ========================
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Cloning repo..."
              git clone https://github.com/vijayqadevkraft/webapplication-repo.git $REPO_DIR
            else
              echo "Pulling latest code..."
              cd $REPO_DIR && git pull origin main
            fi

            # ========================
            # FRONTEND DEPLOY
            # ========================
            echo "🌐 Deploying frontend..."
            sudo mkdir -p /var/www/html/main
            sudo rsync -av --delete $REPO_DIR/app/frontend/ /var/www/html/main/

            # ========================
            # BACKEND DEPLOY
            # ========================
            echo "⚙️ Deploying backend..."

            mkdir -p $APP_DIR
            rsync -av --delete $REPO_DIR/app/backend/ $APP_DIR/

            cd $APP_DIR
            npm install

            # Use PM2 instead of nohup
            pm2 restart webapp || pm2 start server.js --name webapp
            pm2 save

            # ========================
            # SIMPLEWEB DEPLOY
            # ========================
            echo "📄 Deploying simpleweb..."

            sudo mkdir -p /var/www/html/simpleweb
            sudo rsync -av --delete $REPO_DIR/simpleweb/ /var/www/html/simpleweb/

            # ========================
            # NGINX CONFIG
            # ========================
            echo "⚙️ Configuring Nginx..."

            sudo tee /etc/nginx/sites-available/default > /dev/null <<EOF
server {
    listen 80;

    location / {
        root /var/www/html/main;
        index index.html;
        try_files \$uri \$uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
    }

    location /simpleweb/ {
        alias /var/www/html/simpleweb/;
        index index.html;
    }
}
EOF

            sudo nginx -t
            sudo systemctl reload nginx

            # ========================
            # HEALTH CHECK
            # ========================
            echo "🔍 Running health checks..."

            curl -f http://localhost || exit 1
            curl -f http://localhost/simpleweb/ || exit 1

            echo "✅ Deployment Successful"
