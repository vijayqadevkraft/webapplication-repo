<!DOCTYPE html>
<html>
<head>
    <title>DevOps </title>
</head>
<body>

<h1>🚀 Dev team vijay kumar
</h1>

<button onclick="getData()">Get Backend </button>

<p id="result"></p>

<script>
function getData() {
    fetch('/api')
        .then(res => res.json())
        .then(data => {
            document.getElementById('result').innerText = data.message;
        })
        .catch(() => {
            document.getElementById('result').innerText = "❌ Backend not reachable";
        });
}
</script>

</body>
</html>
