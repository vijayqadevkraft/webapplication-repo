<!DOCTYPE html>
<html>
<head>
    <title>DevOps App</title>
</head>
<body>

<h1>🚀 DevOps Web  </h1>

<button onclick="getData()">Get Backend Data</button>

<p id="result"></p>

<script>
function getData() {
    fetch('/api')
        .then(res => res.json())
        .then(data => {
            document.getElementById('result').innerText = data.message;
        })
        .catch(() => {
            document.getElementById('result').innerText = "❌ Backend not reachable";
        });
}
</script>

</body>
</html>
