<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #007bff;
        }
        p {
            font-size: 18px;
            max-width: 600px;
            margin: 20px auto;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Hello, World! 👋</h1>
    <p>This is a simple HTML page. You can edit this however you like!</p>
    
    <button onclick="alert('Hello! Nice to meet you!')">Click Me</button>

    <p style="margin-top: 50px; font-size: 14px; color: #666;">
        Made with ❤️ in just a few lines
    </p>
</body>
</html>
